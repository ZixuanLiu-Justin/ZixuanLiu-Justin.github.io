  sections:
    Research Interests:
      - "My research focuses on developing intelligent surgical assistive systems that integrate mixed reality (MR), robotics, computer vision, and deformable registration to enhance the efficiency of minimally invasive surgeries. I am particularly interested in (1) utilizing MR and computer vision algorithms to provide intraoperative guidance and navigation, (2) developing robotic systems with intelligent decision strategies for understanding the surgical scene, and (3) deformable modeling for soft tissue surgery, especially for breast-conserving surgery (BCS)."

